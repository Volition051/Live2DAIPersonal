# 动作标记枚举（用于 AI 回复的表情动作）
action_markers:
  - nod         # 点头肯定
  - wave        # 挥手欢迎
  - invite      # 邀请手势
  - reject      # 摇头否定
  - think       # 思考
  - explain     # 解释说明
  - celebrate   # 庆祝
  - sad         # 悲伤

# 视频标记说明
video_markers:
  format: "[视频:景点ID]"
  id_pattern: "LS-001~LS-016（灵山胜境）或 NH-001~NH-004（拈花湾）"
